<!DOCTYPE html>                                <!-- 這是網頁的開頭，告訴瀏覽器這是 HTML 文件 -->
<html lang="zh-TW">                              <!-- 設定語言是繁體中文 -->
  <head>                                        <!-- 網頁的「頭」：放一些看不見的設定 -->
    <meta charset="UTF-8">                       <!-- 設定文字編碼，讓中文能正常顯示 -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />  <!-- 設定網頁小圖示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <!-- 讓手機也能正常看 -->
    <title>GitHub 偵察機</title>                <!-- 網頁分頁上顯示的標題 -->
  </head>
  <body>                                        <!-- 網頁的「身體」：所有看得到的內容都在這 -->
    <div id="app"></div>                        <!-- 這是一個「容器」，Vue 的東西會放進來 -->
    <script type="module" src="/src/main.js"></script>  <!-- 載入 JavaScript 程式 -->
  </body>
</html>
